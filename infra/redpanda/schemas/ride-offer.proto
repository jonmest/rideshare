syntax = "proto3";

package rideshare.events;

import "event-metadata.proto";
import "google/protobuf/timestamp.proto";

message RideOffer {
  string event_id = 1;
  string ride_id = 2;
  string driver_id = 3;

  double pickup_lat = 4;
  double pickup_lon = 5;
  double dropoff_lat = 6;
  double dropoff_lon = 7;

  uint32 match_version = 8;
  google.protobuf.Timestamp offered_at = 9;
  google.protobuf.Timestamp expires_at = 10;

  rideshare.events.EventMetadata meta = 11;
}
