syntax = "proto3";

package rideshare.events;

import "event-metadata.proto";
import "google/protobuf/timestamp.proto";

message DriverAvailability {
  string event_id = 1;
  string driver_id = 2;
  DriverStatus status = 3;
  google.protobuf.Timestamp updated_at = 4;
  rideshare.events.EventMetadata meta = 5;
}

enum DriverStatus {
  DRIVER_STATUS_UNSPECIFIED = 0;
  DRIVER_STATUS_AVAILABLE = 1;
  DRIVER_STATUS_UNAVAILABLE = 2;
}